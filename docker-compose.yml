# Data Wiz — Docker Compose
#
# Default: `docker-compose up` starts just the app (SQLite, persisted in a volume)
# With Postgres: `docker-compose --profile postgres up`
#
# Don't forget to set JWT_SECRET in your .env before running.

services:
  app:
    build: .
    image: datawiz:latest
    container_name: datawiz
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=8000
    volumes:
      - datawiz-data:/app/server/data
      - datawiz-uploads:/app/server/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/api/ready"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional Postgres for when the stores are made async.
  # Run with: docker-compose --profile postgres up
  postgres:
    image: postgres:16-alpine
    container_name: datawiz-postgres
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: datawiz
      POSTGRES_USER: datawiz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - datawiz-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  datawiz-data:
  datawiz-uploads:
  datawiz-pgdata:
